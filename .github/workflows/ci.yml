name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -q

      - name: Package
        run: mvn package -DskipTests -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: silver-price-bot
          path: target/silver-price-bot-*.jar
          retention-days: 7

  docker:
    name: Build Docker image (Java)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t silver-price-bot:${{ github.sha }} .

  docker-go:
    name: Build Docker image (Go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t silver-bot-go:${{ github.sha }} ./go

  docker-python:
    name: Build Docker image (Python)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build silver_bot image
        run: docker build -t silver-bot-python:${{ github.sha }} ./python

      - name: Build muavangbac image
        run: docker build -f python/Dockerfile.muavangbac -t silver-bot-muavangbac:${{ github.sha }} ./python